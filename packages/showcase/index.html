<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Slidev Themes Showcase</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: #0a0a0b;
      color: #e4e4e7;
      min-height: 100vh;
    }

    header {
      padding: 2rem 3rem 1rem;
      border-bottom: 1px solid #27272a;
    }

    header h1 {
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    header p {
      color: #71717a;
      margin-top: 0.25rem;
      font-size: 0.875rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(560px, 1fr));
      gap: 2rem;
      padding: 2rem 3rem;
    }

    .card {
      background: #18181b;
      border: 1px solid #27272a;
      border-radius: 12px;
      overflow: hidden;
      transition: border-color 0.2s;
    }

    .card:hover {
      border-color: #3f3f46;
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.75rem 1rem;
      border-bottom: 1px solid #27272a;
    }

    .card-header h2 {
      font-size: 0.875rem;
      font-weight: 500;
    }

    .card-header .meta {
      display: flex;
      gap: 0.5rem;
    }

    .tag {
      font-size: 0.7rem;
      padding: 0.15rem 0.5rem;
      border-radius: 9999px;
      background: #27272a;
      color: #a1a1aa;
    }

    .tag.dark { background: #1e1b4b; color: #818cf8; }
    .tag.light { background: #fef3c7; color: #92400e; }

    .color-bar {
      display: flex;
      height: 4px;
    }

    .color-bar span {
      flex: 1;
    }

    .iframe-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #000;
    }

    .iframe-wrap iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
    }

    .card-footer {
      padding: 0.5rem 1rem;
      display: flex;
      gap: 1rem;
      border-top: 1px solid #27272a;
    }

    .card-footer a {
      font-size: 0.75rem;
      color: #71717a;
      text-decoration: none;
      transition: color 0.2s;
    }

    .card-footer a:hover {
      color: #e4e4e7;
    }

    .nav-hint {
      text-align: center;
      padding: 1rem;
      color: #52525b;
      font-size: 0.75rem;
    }
  </style>
</head>
<body>
  <header>
    <h1>Slidev Themes Showcase</h1>
    <p>Converted from PowerPoint templates via pptx2slidev</p>
  </header>

  <div class="nav-hint">Click an iframe, then use arrow keys to navigate slides</div>

  <div class="grid" id="grid"></div>

  <script>
    const themes = [
      {
            "name": "Eduline-Colored PowerPoint template",
            "variant": "both",
            "colors": [
                  "#F24656",
                  "#129ba6",
                  "#aa8002",
                  "#359f6d",
                  "#dc6900",
                  "#0A6CD1"
            ],
            "fonts": "Helvetica Neue Medium",
            "text": "#000000",
            "bg": "#F7F9FF",
            "path": "/eduline-colored/"
      },
      {
            "name": "Nexbit — Sleek & Light Portfolio design. Brutalist-minimal with extreme typographic scale, stark contrast, and generous whitespace.",
            "variant": "light",
            "colors": [
                  "#1A1A1A",
                  "#404040"
            ],
            "fonts": "Satoshi",
            "text": "#1A1A1A",
            "bg": "#F5F5F3",
            "path": "/nexbit/"
      },
      {
            "name": "Nice PowerPoint template",
            "variant": "both",
            "colors": [
                  "#1365FF",
                  "#000000",
                  "#949494",
                  "#949494",
                  "#949494",
                  "#949494"
            ],
            "fonts": "Montserrat Medium",
            "text": "#00286B",
            "bg": "#FFFFFF",
            "path": "/nice/"
      }
];

    const grid = document.getElementById('grid');

    themes.forEach(t => {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <div class="color-bar">
          ${t.colors.map(c => `<span style="background:${c}"></span>`).join('')}
        </div>
        <div class="card-header">
          <h2>${t.name}</h2>
          <div class="meta">
            <span class="tag ${t.variant}">${t.variant}</span>
            <span class="tag">${t.fonts}</span>
          </div>
        </div>
        <div class="iframe-wrap">
          <iframe src="${t.path}" loading="lazy"></iframe>
        </div>
        <div class="card-footer">
          <a href="${t.path}" target="_blank">Open full &rarr;</a>
          <a href="${t.path}overview/" target="_blank">Overview</a>
          <span style="flex:1"></span>
          <span style="font-size:0.7rem;color:#3f3f46">text: ${t.text} | bg: ${t.bg}</span>
        </div>
      `;
      grid.appendChild(card);
    });
  </script>
</body>
</html>
